seclab-taskflow-agent:
  filetype: taskflow
  version: "1.0"

model_config: seclab_taskflows.configs.model_config

globals:
  repo:

# Example taskflow to fetch and review security advisories for a repository
taskflow:
  - task:
      must_complete: true
      exclude_from_context: false
      agents:
        - seclab_taskflow_agent.personalities.assistant
      model: general_tasks
      user_prompt: |
        Fetch and store all GitHub Security Advisories (GHSAs) for the repo {{ globals.repo }}
        with the return_results option set to true. 

        If an error occurs during fetching, store a GHSASummary with the error message.
        Ensure the error message starts with "Error:" followed by a description of the error.

        If one or more advisories are found, provide a summary of the findings including.
        The ghsa_id of each advisory, followed by the severity and type of vulnerability, together with the location of the vulnerable code if available.
        and store it in a GHSASummary entry in the database.
      toolboxes:
        - seclab_taskflows.toolboxes.ghsa
        - seclab_taskflows.toolboxes.local_file_viewer
