## run via: python -m seclab_taskflow_agent -t seclab_taskflows.taskflows.audit.sosf_workshop.sloppiness_analyzer -g repo=github/Exiv2/exiv2 -g issue_number=3454 

seclab-taskflow-agent:
  filetype: taskflow
  version: "1.0"
model_config: seclab_taskflows.configs.model_config

globals:
  repo: 
  issue_number: 
# Taskflow to audit some potential issues.
taskflow:
  - task:
      must_complete: true
      agents:
        - seclab_taskflow_agent.personalities.assistant
      model: code_analysis
      user_prompt: |
        Fetch the details of issues number {{ globals.issue_number }} of the repo {{ globals.repo }}
        Analyze the issue title and description to determine whether this issues is likely to be AI slop.
      toolboxes:
        - seclab_taskflow_agent.toolboxes.github_official